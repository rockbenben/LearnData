    <!-- 网站运行时间统计 -->
    <script>
      (function () {
        const startTime = Date.UTC(2022, 7, 23, 22, 22, 22); // 北京时间 2022-07-23 22:22:22 //LearnData 首个 commit 时间，改为你自己值得纪念的日子吧
        const MS = { s: 1000, m: 60000, h: 3600000, d: 86400000, y: 31536000000 };

        function updateSiteTime() {
          const now = new Date();
          const diff = Date.UTC(now.getFullYear(), now.getMonth() + 1, now.getDate(), now.getHours(), now.getMinutes(), now.getSeconds()) - startTime;
          const y = Math.floor(diff / MS.y);
          const d = Math.floor((diff % MS.y) / MS.d);
          const h = Math.floor((diff % MS.d) / MS.h);
          const m = Math.floor((diff % MS.h) / MS.m);
          const s = Math.floor((diff % MS.m) / MS.s);
          const el = document.getElementById("sitetime");
          if (el) el.textContent = y > 0 ? `已运行 ${y} 年 ${d} 天 ${h} 小时 ${m} 分 ${s} 秒` : `已运行 ${d} 天 ${h} 小时 ${m} 分 ${s} 秒`;
        }

        updateSiteTime();
        setInterval(updateSiteTime, 1000);
      })();
    </script>

    <!-- Waline v3 评论系统 -->
    <script type="module">
      import { init, pageviewCount } from "https://oss.newzone.top/@waline/3.8.0/client/dist/waline.js";

      const walineConfig = window.$docsify?.waline || {};
      if (!walineConfig.serverURL) {
        console.warn("[Waline] serverURL is required");
      } else {
        let walineInstance = null;
        const lang = window.$docsify?.count?.language || "chinese";
        const suffix = lang === "chinese" ? "次阅读" : " views";

        function createContainer() {
          let container = document.getElementById("waline");
          if (!container) {
            container = document.createElement("div");
            container.id = "waline";
            container.style.cssText = "max-width: var(--content-max-width, 1200px); margin: 2rem auto; padding: 0 15px;";
          }
          return container;
        }

        function initWaline() {
          const article = document.querySelector("article.markdown-section");
          if (!article) return;

          const container = createContainer();
          if (!article.contains(container)) {
            article.appendChild(container);
          }

          const path = (window.location.pathname + window.location.hash).replace(/\?.*$/, "");

          const headerSpan = document.querySelector("#main div > span");
          if (headerSpan) {
            let counter = headerSpan.querySelector(".waline-pageview-count");
            if (!counter) {
              headerSpan.innerHTML += `&nbsp;|&nbsp;<span class="waline-pageview-count" data-path="${path}"></span>&nbsp;${suffix}`;
            } else {
              counter.setAttribute("data-path", path);
              counter.textContent = "";
            }
          }

          if (walineInstance?.destroy) walineInstance.destroy();

          walineInstance = init({
            el: "#waline",
            serverURL: walineConfig.serverURL,
            path: path,
            pageview: true,
            reaction: walineConfig.reaction || false,
            locale: walineConfig.locales?.["/"] || {},
          });

          pageviewCount({
            serverURL: walineConfig.serverURL,
            path: path,
            selector: ".waline-pageview-count",
            update: true,
          });
        }

        // 页面初始加载尝试初始化
        setTimeout(initWaline, 500);
        setTimeout(initWaline, 1500); // 重试一次以防万一

        // 监听 docsify 路由变化
        let lastPath = "";
        const observer = new MutationObserver(() => {
          const currentPath = window.location.pathname + window.location.hash;
          if (currentPath !== lastPath) {
            lastPath = currentPath;
            setTimeout(initWaline, 100);
          }
        });

        // 无论 DOMContentLoaded 是否已触发，都开始监听
        const target = document.querySelector("#main");
        if (target) {
          observer.observe(target, { childList: true, subtree: true });
        } else {
          window.addEventListener("DOMContentLoaded", () => {
            const t = document.querySelector("#main");
            if (t) observer.observe(t, { childList: true, subtree: true });
            setTimeout(initWaline, 500);
          });
        }
      }
    </script>
